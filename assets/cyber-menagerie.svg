<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">ihopenre-eng animated OSS security engineering city</title>
  <desc id="desc">A neon engineering city with matrix rain, a flying drone, sparks, a running fox, and a pull request delivery pipeline.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#03040a"/>
      <stop offset="0.58" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#170421"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f5d4"/>
      <stop offset="0.5" stop-color="#3a86ff"/>
      <stop offset="1" stop-color="#ff006e"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101426"/>
      <stop offset="1" stop-color="#03040a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="28" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V28" fill="none" stroke="#3a86ff" stroke-opacity=".18"/>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="screen"><rect x="14" y="14" width="1172" height="472" rx="22"/></clipPath>
  </defs>

  <rect width="1200" height="500" rx="24" fill="url(#sky)"/>
  <rect x="14" y="14" width="1172" height="472" rx="22" fill="none" stroke="url(#neon)" stroke-width="2"/>

  <g clip-path="url(#screen)">
    <ellipse cx="600" cy="220" rx="430" ry="105" fill="#8338ec" opacity=".09" filter="url(#soft)">
      <animate attributeName="opacity" values=".05;.14;.05" dur="5s" repeatCount="indefinite"/>
    </ellipse>

    <g fill="#00f5d4" font-family="monospace" font-size="12" opacity=".18">
      <text x="38" y="-20">01 00 11 10 01 11 00<animate attributeName="y" from="-20" to="390" dur="5.3s" repeatCount="indefinite"/></text>
      <text x="108" y="-80">7F 3C 90 4A 00 FF<animate attributeName="y" from="-80" to="410" dur="6.7s" repeatCount="indefinite"/></text>
      <text x="1018" y="-50">git diff --check &amp;&amp; make test<animate attributeName="y" from="-50" to="400" dur="5.9s" repeatCount="indefinite"/></text>
      <text x="1110" y="-120">PR REVIEW CI GREEN MERGE<animate attributeName="y" from="-120" to="390" dur="7.1s" repeatCount="indefinite"/></text>
    </g>

    <g fill="#f0f6fc">
      <circle cx="70" cy="68" r="2"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="218" cy="102" r="1.5"><animate attributeName="opacity" values="1;.1;1" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="82" r="2"><animate attributeName="opacity" values=".1;1;.1" dur="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="1138" cy="126" r="1.5"><animate attributeName="opacity" values="1;.1;1" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="780" cy="48" r="1"><animate attributeName="r" values="1;3;1" dur="1.9s" repeatCount="indefinite"/></circle>
      <circle cx="370" cy="54" r="1"><animate attributeName="r" values="1;2.5;1" dur="2.4s" repeatCount="indefinite"/></circle>
    </g>

    <g opacity=".5" fill="#0c1427" stroke="#3a86ff" stroke-opacity=".3">
      <path d="M20 332V250h92v82M90 332V210h78v122M154 332V268h74v64M214 332V198h112v134M312 332V242h70v90M368 332V185h104v147M460 332V230h84v102M530 332V170h118v162M636 332V220h80v112M702 332V188h112v144M800 332V246h74v86M860 332V208h98v124M944 332V166h112v166M1042 332V235h70v97M1100 332V190h88v142"/>
    </g>

    <g fill="#00f5d4" opacity=".38">
      <rect x="245" y="222" width="8" height="4"><animate attributeName="opacity" values=".2;1;.2" dur="1.3s" repeatCount="indefinite"/></rect>
      <rect x="275" y="246" width="8" height="4"><animate attributeName="opacity" values="1;.15;1" dur="1.8s" repeatCount="indefinite"/></rect>
      <rect x="568" y="202" width="8" height="4"><animate attributeName="opacity" values=".15;1;.15" dur="1.1s" repeatCount="indefinite"/></rect>
      <rect x="743" y="224" width="8" height="4"><animate attributeName="opacity" values="1;.2;1" dur="2.2s" repeatCount="indefinite"/></rect>
      <rect x="980" y="197" width="8" height="4"><animate attributeName="opacity" values=".1;1;.1" dur="1.6s" repeatCount="indefinite"/></rect>
    </g>

    <rect x="0" y="332" width="1200" height="168" fill="url(#road)"/>
    <g>
      <rect x="0" y="340" width="1200" height="160" fill="url(#grid)" opacity=".72">
        <animateTransform attributeName="transform" type="translate" from="0 0" to="0 28" dur=".9s" repeatCount="indefinite"/>
      </rect>
      <path d="M0 384H1200" stroke="#00f5d4" stroke-opacity=".32" stroke-width="2" stroke-dasharray="28 22">
        <animate attributeName="stroke-dashoffset" from="0" to="-100" dur="1.1s" repeatCount="indefinite"/>
      </path>
    </g>

    <g transform="translate(600 76)" text-anchor="middle">
      <text y="0" fill="#8b949e" font-family="monospace" font-size="15" letter-spacing="4">OSS@SEC-ENG // CONTRIBUTION PIPELINE</text>
      <text y="72" fill="#f0f6fc" font-family="sans-serif" font-size="58" font-weight="900" letter-spacing="3">IHOPENRE-ENG</text>
      <text y="72" fill="#00f5d4" opacity=".55" font-family="sans-serif" font-size="58" font-weight="900" letter-spacing="3">
        IHOPENRE-ENG
        <animate attributeName="x" values="-5;4;0;0;3;-2;0" dur="2.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;.55;0;0;.4;0" dur="2.7s" repeatCount="indefinite"/>
      </text>
      <rect x="-370" y="90" width="740" height="4" rx="2" fill="url(#neon)" filter="url(#glow)">
        <animate attributeName="width" values="180;740;740;180" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-90;-370;-370;-90" dur="4s" repeatCount="indefinite"/>
      </rect>
      <text y="132" fill="#00f5d4" font-family="monospace" font-size="20" letter-spacing="3">LEE SEONGHYEON // &#51060;&#49457;&#54788; // @LSHDF</text>
      <text y="166" fill="#ff4d9d" font-family="monospace" font-size="16" letter-spacing="2">AUTHN/AUTHZ // SECURE DEFAULTS // OSS PRS</text>
    </g>

    <g filter="url(#glow)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="-100 165;1260 110;-100 165" dur="12s" repeatCount="indefinite"/>
        <path d="M0 18L24 5l31 13-31 12z" fill="#3a86ff"/>
        <circle cx="24" cy="17" r="6" fill="#ff006e"><animate attributeName="fill" values="#ff006e;#00f5d4;#ff006e" dur=".7s" repeatCount="indefinite"/></circle>
        <path d="M5 26l-12 14M43 26l12 14" stroke="#00f5d4" stroke-width="3"/>
      </g>
    </g>

    <g shape-rendering="crispEdges">
      <animateTransform attributeName="transform" type="translate" from="-210 356" to="1260 356" dur="7.5s" repeatCount="indefinite"/>
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0" dur=".34s" repeatCount="indefinite"/>
        <g opacity=".2" transform="translate(-70 8)"><path d="M18 35H96V69H18z" fill="#ff006e"/></g>
        <path d="M22 36L0 18l8 34 26 15z" fill="#ff006e">
          <animateTransform attributeName="transform" type="rotate" values="-12 28 50;14 28 50;-12 28 50" dur=".34s" repeatCount="indefinite"/>
        </path>
        <rect x="30" y="30" width="76" height="42" fill="#f97316"/>
        <rect x="45" y="38" width="56" height="28" fill="#ff9f1c"/>
        <path d="M88 30l13-25 12 27zM106 31l19-20 2 31z" fill="#f97316"/>
        <rect x="97" y="30" width="38" height="34" fill="#ff9f1c"/>
        <rect x="128" y="43" width="17" height="12" fill="#f0f6fc"/>
        <rect x="116" y="37" width="5" height="5" fill="#03040a"><animate attributeName="height" values="5;1;5" dur="2.2s" repeatCount="indefinite"/></rect>
        <rect x="31" y="69" width="13" height="34" fill="#f97316">
          <animateTransform attributeName="transform" type="rotate" values="24 38 70;-30 38 70;24 38 70" dur=".34s" repeatCount="indefinite"/>
        </rect>
        <rect x="65" y="68" width="13" height="34" fill="#ff9f1c">
          <animateTransform attributeName="transform" type="rotate" values="-28 72 70;26 72 70;-28 72 70" dur=".34s" repeatCount="indefinite"/>
        </rect>
        <rect x="92" y="68" width="12" height="31" fill="#f97316">
          <animateTransform attributeName="transform" type="rotate" values="20 98 70;-24 98 70;20 98 70" dur=".34s" repeatCount="indefinite"/>
        </rect>
        <g fill="#00f5d4" filter="url(#glow)">
          <circle cx="160" cy="55" r="3"><animate attributeName="r" values="1;4;1" dur=".7s" repeatCount="indefinite"/></circle>
          <circle cx="176" cy="38" r="2"><animate attributeName="opacity" values="0;1;0" dur=".5s" repeatCount="indefinite"/></circle>
        </g>
      </g>
    </g>

    <rect x="14" y="14" width="1172" height="472" rx="22" fill="none" stroke="#00f5d4" stroke-opacity=".2">
      <animate attributeName="stroke-opacity" values=".15;.55;.15" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="14" y="-70" width="1172" height="70" fill="#00f5d4" opacity=".045">
      <animate attributeName="y" from="-70" to="500" dur="3.8s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
