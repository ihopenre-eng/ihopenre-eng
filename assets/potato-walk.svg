<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 190" role="img" aria-labelledby="title desc">
  <title id="title">A potato mascot walks past a terminal</title>
  <desc id="desc">A polished potato mascot walks and blinks beside an animated terminal showing scan, patch, and ship.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#080d16"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#10251c"/>
      <stop offset="1" stop-color="#09140f"/>
    </linearGradient>
    <linearGradient id="skin" x1=".15" y1="0" x2=".85" y2="1">
      <stop stop-color="#ffe19a"/>
      <stop offset=".42" stop-color="#eab55e"/>
      <stop offset="1" stop-color="#b96d2c"/>
    </linearGradient>
    <linearGradient id="limb" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff0bf"/>
      <stop offset="1" stop-color="#d89142"/>
    </linearGradient>
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dy="4" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope=".28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="terminal-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="880" height="170" rx="24" fill="url(#panel)" stroke="#273244" stroke-width="2"/>
  <path d="M46 143H854" fill="none" stroke="#324055" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 11" opacity=".9"/>
  <path d="M46 144H854" fill="none" stroke="#00d3aa" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 11" opacity=".22">
    <animate attributeName="stroke-dashoffset" values="0;-130" dur="4s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(53 34)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="238" height="111" rx="10" fill="#101722" stroke="#46556c" stroke-width="2"/>
    <rect x="10" y="12" width="218" height="82" rx="5" fill="url(#screen)" stroke="#273f34"/>
    <circle cx="23" cy="24" r="3" fill="#ff5f57"/>
    <circle cx="34" cy="24" r="3" fill="#ffbd2e"/>
    <circle cx="45" cy="24" r="3" fill="#28c840"/>
    <g fill="#78f08a" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="13" filter="url(#terminal-glow)">
      <text x="24" y="49">&gt; scan</text>
      <text x="24" y="67">&gt; patch</text>
      <text x="24" y="85">&gt; ship</text>
      <rect x="77" y="74" width="7" height="12" fill="#78f08a">
        <animate attributeName="opacity" values="1;1;0;0;1" dur=".9s" repeatCount="indefinite"/>
      </rect>
    </g>
    <path d="M-14 112H252L273 128H-35Z" fill="#1b2636" stroke="#46556c" stroke-width="2"/>
    <path d="M74 116H164L172 123H66Z" fill="#0d131e" stroke="#374458"/>
  </g>

  <g fill="#78f08a" opacity=".75">
    <circle cx="330" cy="71" r="2"><animate attributeName="cy" values="71;58;71" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="358" cy="107" r="2"><animate attributeName="cy" values="107;94;107" dur="2.1s" begin="-.7s" repeatCount="indefinite"/></circle>
    <circle cx="804" cy="70" r="2"><animate attributeName="cy" values="70;58;70" dur="2.4s" begin="-1.1s" repeatCount="indefinite"/></circle>
  </g>

  <g transform="translate(315 0)" filter="url(#soft-shadow)">
    <animateTransform attributeName="transform" type="translate" values="315 0;640 0;315 0" keyTimes="0;.5;1" dur="9s" repeatCount="indefinite"/>
    <g transform="translate(0 2)">
      <animateTransform attributeName="transform" type="translate" values="0 2;0 -3;0 2;0 0;0 2" keyTimes="0;.25;.5;.75;1" dur=".62s" repeatCount="indefinite"/>

      <path d="M22 84C5 84-7 72-3 59C1 46 16 49 29 58" fill="none" stroke="#c77c35" stroke-width="9" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="-6 30 72;12 30 72;-6 30 72" dur=".62s" repeatCount="indefinite"/>
      </path>
      <path d="M147 80C164 74 173 62 169 52" fill="none" stroke="#c77c35" stroke-width="9" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="9 145 75;-9 145 75;9 145 75" dur=".62s" repeatCount="indefinite"/>
      </path>

      <ellipse cx="81" cy="128" rx="25" ry="11" fill="url(#limb)" stroke="#b86b2d" stroke-width="2.5">
        <animateTransform attributeName="transform" type="rotate" values="-18 81 116;18 81 116;-18 81 116" dur=".62s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="126" cy="128" rx="25" ry="11" fill="url(#limb)" stroke="#b86b2d" stroke-width="2.5">
        <animateTransform attributeName="transform" type="rotate" values="18 126 116;-18 126 116;18 126 116" dur=".62s" repeatCount="indefinite"/>
      </ellipse>

      <path d="M38 52C48 16 125 7 153 35C175 57 166 102 139 117C105 136 48 122 31 90C24 76 27 62 38 52Z" fill="url(#skin)" stroke="#a95e28" stroke-width="3"/>
      <ellipse cx="72" cy="45" rx="18" ry="9" fill="#fff2c8" opacity=".58" transform="rotate(-30 72 45)"/>
      <path d="M57 74C61 70 65 70 69 73" fill="none" stroke="#c17b35" stroke-width="3" stroke-linecap="round" opacity=".65"/>
      <circle cx="130" cy="38" r="4" fill="#c17732" opacity=".8"/>
      <circle cx="147" cy="68" r="3" fill="#c17732" opacity=".8"/>
      <circle cx="104" cy="105" r="3.5" fill="#c17732" opacity=".72"/>
      <ellipse cx="94" cy="68" rx="6" ry="10" fill="#20150e">
        <animate attributeName="ry" values="10;10;1;10;10" keyTimes="0;.42;.48;.54;1" dur="3.6s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="122" cy="68" rx="6" ry="10" fill="#20150e">
        <animate attributeName="ry" values="10;10;1;10;10" keyTimes="0;.42;.48;.54;1" dur="3.6s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="92" cy="65" r="1.6" fill="#fff" opacity=".92"/>
      <circle cx="120" cy="65" r="1.6" fill="#fff" opacity=".92"/>
      <path d="M99 88Q108 96 118 88" fill="none" stroke="#20150e" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="72" cy="84" rx="8" ry="4" fill="#df7e6f" opacity=".34"/>
      <ellipse cx="143" cy="84" rx="8" ry="4" fill="#df7e6f" opacity=".34"/>
    </g>
  </g>

  <g fill="#f8d06f" opacity=".9">
    <path d="M735 42l2.5 6 6 2.5-6 2.5-2.5 6-2.5-6-6-2.5 6-2.5z">
      <animateTransform attributeName="transform" type="rotate" values="0 737 50;360 737 50" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M822 112l1.8 4.5 4.5 1.8-4.5 1.8-1.8 4.5-1.8-4.5-4.5-1.8 4.5-1.8z">
      <animate attributeName="opacity" values=".2;1;.2" dur="1.7s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
